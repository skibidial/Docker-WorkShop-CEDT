services:
  web:
    # TODO(step-5a): build จาก Dockerfile ในปัจจุบันและเปิดพอร์ต 3000
    build: .
    ports:
      - "3000:3000"

    # TODO(step-5b): ตั้งค่า DATABASE_URL (db คือชื่อ service ด้านล่าง)
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/workshop

    # TODO(step-5c): ให้ web รอจนกว่า db จะ healthy
    depends_on:
      db:
        condition: service_healthy

  db:
    # TODO(step-5d): ใช้ postgres:16-alpine และตั้ง healthcheck
    image: postgres:16-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workshop"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

    volumes:
      # TODO(step-5e): mount volume ชื่อ pgdata
      - pgdata:/var/lib/postgresql/data
      # TODO(step-5g): bind-mount ไฟล์ init.sql เพื่อสร้างข้อมูลเริ่มต้น
      - ./app/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    # TODO(step-5f): ตั้งค่าตัวแปรสภาพแวดล้อมสำหรับ Postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workshop

# TODO(step-5h): ประกาศชื่อ volume ที่ใช้
volumes:
  pgdata: